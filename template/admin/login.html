<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Maison Luxe Admin</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

  <!-- Project styles -->
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/login.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body class="login-page">

  <!-- Page Loader -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading</div>
  </div>

  <!-- Theme switch -->
  <button class="icon-btn js-theme-toggle login-theme-switch" aria-label="Toggle dark mode">
    <i class="bi bi-moon-stars"></i>
  </button>

  <div class="login-shell">
    <div class="login-card">

      <div class="login-brand">
        <div class="brand-mark">M</div>
        <h1>Welcome back</h1>
        <p>Sign in to your Maison Luxe admin account</p>
      </div>

      <form id="loginForm" method="post">

        <div class="form-row">
          <label class="form-label" for="loginEmail">Email</label>
          <div class="input-icon">
            <i class="bi bi-envelope"></i>
            <input type="email" id="loginEmail" name="email" class="form-control" placeholder="name@example.com" />
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-icon has-toggle">
            <i class="bi bi-lock"></i>
            <input type="password" id="loginPassword" name="password" class="form-control" placeholder="Enter your password" />
            <button type="button" class="toggle-pass js-toggle-pass" aria-label="Show or hide password" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="login-row-between">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="javascript:void(0);">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="bi bi-box-arrow-in-right"></i> Sign in
        </button>

        <div class="login-foot">
          New to Maison Luxe? <a href="javascript:void(0);">Request access</a>
        </div>
      </form>

    </div>
  </div>

  <!-- jQuery + Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Project JS -->
  <script src="../assets/js/script.js"></script>
</body>
</html>
